<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmond | Developer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <nav class="navbar">
        <div class="navbar-container">
            <a class="nav-logo" href="#hero">Edmond</a>
            <div class="nav-menu">
                <a href="#about">About</a>
                <a href="#skills">Skills</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main>
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <h1 class="hero-name">Edmond</h1>
                <p class="hero-tagline">
                    <span class="typing-text"></span>
                </p>
                <div class="hero-cta">
                    <a href="#projects" class="btn btn-primary">View Projects</a>
                    <a href="#contact" class="btn btn-secondary">Contact Me</a>
                </div>
            </div>
            <canvas id="hero-canvas"></canvas>
        </section>

        <section id="about" class="content-section">
            <h2 class="section-title">My Journey</h2>
            <div class="timeline">
                <!-- Timeline items will be injected by JS -->
            </div>
        </section>

        <section id="skills" class="content-section">
            <h2 class="section-title">Tech Stack</h2>
            <div class="skills-grid">
                <!-- Skill cards will be injected by JS -->
            </div>
        </section>

        <section id="projects" class="content-section">
            <h2 class="section-title">My Projects</h2>
            <div class="projects-grid">
                <!-- Project cards will be injected by JS -->
            </div>
        </section>

        <section id="contact" class="content-section">
            <h2 class="section-title">Get In Touch</h2>
            <div class="contact-container">
                <p>I'm always open to discussing new projects or opportunities. Feel free to reach out.</p>
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" required>
                        <label for="name">Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" rows="4" required></textarea>
                        <label for="message">Message</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
                <div class="social-links">
                     <a href="https://www.instagram.com/edmond_two/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                    <a href="#" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://github.com/edm-ond" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Edmond. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
